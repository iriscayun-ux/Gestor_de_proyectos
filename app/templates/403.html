<!DOCTYPE html>
{% extends 'base.html' %}

{% block title %}Acceso denegado{% endblock %}

{% block content %}
<div class="container text-center mt-5">

    <!-- Icono de advertencia -->
    <div class="mb-4">
        <h1 class="display-1 text-danger">🚫</h1>
        <h2 class="fw-bold">Error 403 - Permiso denegado</h2>
        <p class="text-muted">
            Lo sentimos, no tienes los permisos suficientes para acceder a esta página.
        </p>
    </div>

    <!-- Botón volver al inicio -->
    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
        ← Volver al inicio
    </a>

</div>
{% endblock %}
